<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ★ Issue #1: イベント名に変更する  変更　今満-->
  <title>音楽祭</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ナビゲーション（Issue #1 担当） -->
  <header class="site-header">
    <div class="header-inner">
      <!-- ★ Issue #1: イベント名に変更 変更　今満-->
      <span class="logo">音楽祭</span>
      <nav class="site-nav">
        <ul>
          <li><a href="#about">概要</a></li>
          <li><a href="#program">プログラム</a></li>
          <li><a href="#access">アクセス</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ヒーローセクション（Issue #1 担当　今満） -->
    <section id="hero" class="hero">
      <div class="hero-inner">
        <!-- ★ Issue #1: イベント名に変更 変更　今満-->
        <p class="hero-eyebrow">2026.08.01 sat — sun</p>
        <h1 class="hero-title">音楽祭</h1>
        <!-- ★ Issue #1: キャッチコピーに変更 -->
        <p class="hero-catch">キャッチコピーをここに記入してください</p>
        <a href="#about" class="btn btn-primary">詳しく見る</a>
      </div>
    </section>

    <!-- 概要セクション（Issue #2 担当　今満） -->
    <section id="about" class="about">
      <div class="section-inner">
        <h2 class="section-title">イベント概要</h2>
        <div class="about-grid">

          <div class="about-card">
            <div class="about-icon">📅</div>
            <h3>開催日時</h3>
            <!-- ★ Issue #2: 日時に変更 -->
            <p>４月１６日</p>
          </div>

          <div class="about-card">
            <div class="about-icon">📍</div>
            <h3>開催場所</h3>
            <!-- ★ Issue #2: 場所に変更 -->
            <p>東京文化会館（上野公園内）</p>
          </div>

          <div class="about-card">
            <div class="about-icon">🎟</div>
            <h3>入場料</h3>
            <!-- ★ Issue #2: 料金に変更 -->
            <p>4000円</p>
          </div>

          <div class="about-card">
            <div class="about-icon">👥</div>
            <h3>定員</h3>
            <!-- ★ Issue #2: 定員に変更 -->
            <p>1000人</p>
          </div>

        </div>
      </div>
    </section>

    <!-- プログラムセクション（Issue #3 担当　金井） -->
    <section id="program" class="program">
      <div class="section-inner">
        <h2 class="section-title">タイムスケジュール</h2>
        <div class="program-list">

          <!-- ★ Issue #3: イベントテーマに合わせてコンテンツを追加してください -->
		  <img src="スクリーンショット 2026-04-16 142518.png" alt="タイムスケジュールのスクショ" style="width: 100%; height: auto;">

        </div>
      </div>
    </section>

    <!-- アクセスセクション（Issue #4 担当　高田） -->
    <section id="access" class="access">
      <div class="section-inner">
        <h2 class="section-title">アクセス</h2>
        <div class="access-grid">

          <!-- ★ Issue #4: イベントテーマに合わせてコンテンツを追加してください -->
		  <!--アクセスの概要-->
          <div class="access-info">
			<div class="access-venue">
				<h3>会場</h3>
				<p>東京文化会館</p>
			</div>
			<div class="access-time">
				<h3>最寄り駅</h3>
				<p>JR上野駅:公園改札から徒歩約1分</p>
				<p>東京メトロ上野駅:7番出口から徒歩5分</p>
				<p>京成上野駅：正面口 改札から徒歩7分</p>
			</div>
		  </div>
		  
		  <div class="git ">
			<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3239.521373392715!2d139.77380281894412!3d35.71339409671446!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188e9db2121245%3A0x14f8adfd5e21d34c!2z5p2x5Lqs5paH5YyW5Lya6aSo!5e0!3m2!1sja!2sjp!4v1776311591429!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
		  </div>
		  <!--ここまで-->
        </div>
      </div>
    </section>

  </main>

  <!-- フッター（Issue #1 担当　今満） -->
  <footer class="site-footer">
    <!-- ★ Issue #1: イベント名・問い合わせ先に変更 -->
    <p class="footer-event-name">音楽祭</p>
    <p>&copy; 2026 イベント実行委員会</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
